            <linearGradient id="clock" x1="450" y1="450" x2="850" y2="850" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#3B82F6"/>
                <stop offset="1" stop-color="#1D4ED8"/>
            </linearGradient>
        
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(292 240) rotate(43) scale(470 611)">
      <stop stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="72" y="72" width="880" height="880" rx="236" fill="url(#bg)"/>
  <rect x="72" y="72" width="880" height="880" rx="236" fill="url(#shine)"/>
  
            <circle cx="200" cy="800" r="140" fill="#B45309" fill-opacity="0.15"/>
