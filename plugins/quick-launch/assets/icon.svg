<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="flame" x1="186" y1="300" x2="256" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- 圆角底板 -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>

  <!-- 火箭主体（指向右上，代表“快速启动”） -->
  <g transform="rotate(45 256 256)">
    <!-- 机身 -->
    <path d="M256 116c46 34 70 92 70 156 0 22-4 42-10 60h-120c-6-18-10-38-10-60 0-64 24-122 70-156z" fill="#ffffff"/>
    <!-- 舷窗 -->
    <circle cx="256" cy="226" r="30" fill="#3b82f6"/>
    <circle cx="256" cy="226" r="15" fill="#dbeafe"/>
    <!-- 尾翼 -->
    <path d="M186 308c-26 12-44 36-50 70 28-4 52-14 70-30z" fill="#c7d2fe"/>
    <path d="M326 308c26 12 44 36 50 70-28-4-52-14-70-30z" fill="#c7d2fe"/>
    <!-- 尾焰 -->
    <path d="M226 332h60c-6 40-20 70-30 84-10-14-24-44-30-84z" fill="url(#flame)"/>
  </g>

  <!-- 启动星点 -->
  <circle cx="132" cy="150" r="11" fill="#ffffff" opacity="0.9"/>
  <circle cx="392" cy="372" r="8" fill="#ffffff" opacity="0.75"/>
  <circle cx="372" cy="140" r="6" fill="#ffffff" opacity="0.7"/>
</svg>
