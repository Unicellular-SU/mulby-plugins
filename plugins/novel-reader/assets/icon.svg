<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Novel Reader</title>
  <desc id="desc">An open book with chapter lines, a bookmark, and a reading progress mark.</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="52" x2="420" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.56" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#2A3D2C"/>
    </linearGradient>
    <linearGradient id="pageLeft" x1="95" y1="130" x2="248" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCEBFF"/>
    </linearGradient>
    <linearGradient id="pageRight" x1="264" y1="130" x2="417" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#CCECE0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
    <filter id="pageShadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#0F172A" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>
  <path d="M111 104c82-44 212-45 290 2" fill="none" stroke="#60A5FA" stroke-width="14" stroke-linecap="round" opacity="0.3"/>
  <path d="M82 356c53 55 118 82 174 82 57 0 123-27 174-82" fill="none" stroke="#B1D8B6" stroke-width="16" stroke-linecap="round" opacity="0.22"/>

  <g filter="url(#softShadow)">
    <path d="M256 152c-40-29-96-44-152-42-11 0-20 9-20 21v212c0 12 10 22 22 21 56-2 109 12 150 42V152Z" fill="url(#pageLeft)"/>
    <path d="M256 152c40-29 96-44 152-42 11 0 20 9 20 21v212c0 12-10 22-22 21-56-2-109 12-150 42V152Z" fill="url(#pageRight)"/>
  </g>

  <g filter="url(#pageShadow)">
    <path d="M256 146v263" fill="none" stroke="#3B82F6" stroke-width="14" stroke-linecap="round"/>
    <path d="M103 135c50-2 105 9 153 40" fill="none" stroke="#BFDBFE" stroke-width="9" stroke-linecap="round"/>
    <path d="M409 135c-50-2-105 9-153 40" fill="none" stroke="#B1D8B6" stroke-width="9" stroke-linecap="round"/>
  </g>

  <path d="M303 122h62v120l-31-21-31 21V122Z" fill="#3B82F6"/>
  <path d="M320 142h28" stroke="#DBEAFE" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

  <g fill="none" stroke-linecap="round" stroke-width="14">
    <path d="M132 188h74" stroke="#64748B" opacity="0.72"/>
    <path d="M132 229h90" stroke="#64748B" opacity="0.46"/>
    <path d="M132 270h74" stroke="#64748B" opacity="0.46"/>
    <path d="M306 286h74" stroke="#2E7D32" opacity="0.62"/>
    <path d="M306 327h90" stroke="#2E7D32" opacity="0.38"/>
  </g>

  <path d="M130 340h76" stroke="#3B82F6" stroke-width="16" stroke-linecap="round"/>
  <path d="M130 340h38" stroke="#DBEAFE" stroke-width="16" stroke-linecap="round"/>
  <circle cx="397" cy="392" r="38" fill="#3B82F6"/>
  <path d="M381 392l11 11 24-27" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
