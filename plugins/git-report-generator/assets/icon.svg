<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    
    <!-- 卡片背景渐变 -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Git 分支渐变 (主) -->
    <linearGradient id="gitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>

    <!-- Git 分支渐变 (交替) -->
    <linearGradient id="gitGradientAlt" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#00F2FE"/>
    </linearGradient>

    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 圆角方形背景 -->
  <rect width="512" height="512" rx="128" fill="url(#bgGradient)" />

  <!-- 主卡片 / 文档背景 -->
  <g id="card" filter="url(#shadow)">
    <rect x="128" y="128" width="256" height="256" rx="64" fill="url(#cardGradient)" stroke="#3B4A60" stroke-width="6" />
    
    <!-- 顶部装订线 -->
    <path d="M 184 152 L 328 152" stroke="#64748B" stroke-width="10" stroke-linecap="round" opacity="0.8" />
    
    <!-- 装订环 -->
    <circle cx="160" cy="152" r="8" fill="#64748B" opacity="0.8" />
    <circle cx="352" cy="152" r="8" fill="#64748B" opacity="0.8" />

    <!-- 文档横格线（左侧） -->
    <path d="M 168 232 L 224 232 M 168 256 L 224 256 M 168 280 L 224 280 M 168 304 L 200 304" stroke="#475569" stroke-width="8" stroke-linecap="round" opacity="0.6" />

    <!-- 日历网格（右侧） -->
    <rect x="264" y="220" width="64" height="64" rx="12" fill="none" stroke="#475569" stroke-width="4" opacity="0.6" />
    <path d="M 264 244 L 328 244" stroke="#475569" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    <path d="M 280 220 L 280 284 M 296 220 L 296 284 M 312 220 L 312 284" stroke="#475569" stroke-width="4" stroke-linecap="round" opacity="0.4" />
  </g>

  <!-- Git 分支网络 -->
  <g id="git-branch" filter="url(#shadow)">
    <!-- 分支连线 -->
    <path d="M 256 164 L 256 264 L 176 324 M 256 264 L 336 324" stroke="url(#gitGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- 底部提交节点（右侧） -->
    <circle cx="336" cy="324" r="16" fill="url(#gitGradientAlt)" />
    <circle cx="336" cy="324" r="6" fill="#FFFFFF" opacity="0.9" />

    <!-- 底部提交节点（左侧） -->
    <circle cx="176" cy="324" r="16" fill="url(#gitGradientAlt)" />
    <circle cx="176" cy="324" r="6" fill="#FFFFFF" opacity="0.9" />
  </g>

  <!-- AI 魔法 / 日报生成火花 -->
  <g id="ai-magic" filter="url(#shadow)">
    <!-- 4角外火花（白色） -->
    <path d="M 256 108 L 264 152 L 312 160 L 264 168 L 256 212 L 248 168 L 200 160 L 248 152 Z" fill="#FFFFFF" />
    
    <!-- 4角内火花（渐变青色） -->
    <path d="M 256 132 L 260 156 L 284 160 L 260 164 L 256 188 L 252 164 L 228 160 L 252 156 Z" fill="url(#gitGradient)" />
    
    <!-- 中心高光 -->
    <circle cx="256" cy="160" r="4" fill="#FFFFFF" />
  </g>
</svg>