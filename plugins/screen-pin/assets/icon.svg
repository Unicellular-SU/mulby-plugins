<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="pin" x1="256" y1="100" x2="256" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 屏幕框 -->
  <rect x="100" y="140" width="312" height="220" rx="16" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <!-- 截图区域（虚线选区） -->
  <rect x="150" y="175" width="180" height="130" rx="6" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-width="2.5" stroke-dasharray="8 4"/>
  <!-- 图钉 -->
  <g transform="translate(330, 120) rotate(20)">
    <!-- 钉头圆 -->
    <circle cx="0" cy="0" r="32" fill="url(#pin)" stroke="#fff" stroke-width="2"/>
    <!-- 钉针 -->
    <line x1="0" y1="32" x2="0" y2="80" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <!-- 中心点 -->
    <circle cx="0" cy="0" r="10" fill="#3B82F6" opacity="0.8"/>
  </g>
  <!-- 底部说明文字区 -->
  <rect x="160" y="390" width="192" height="24" rx="12" fill="rgba(255,255,255,0.25)"/>
</svg>
