<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40" y1="40" x2="472" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="vid" x1="250" y1="250" x2="400" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="3" fill="#ffffff" opacity="0.13"/>
    </pattern>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 无限画布底板 + 网格点 -->
  <rect x="40" y="40" width="432" height="432" rx="100" fill="url(#bg)"/>
  <rect x="40" y="40" width="432" height="432" rx="100" fill="url(#dots)"/>

  <!-- 连线（引用） -->
  <path d="M 196 250 C 250 250 250 300 300 300" stroke="#ffffff" stroke-opacity="0.6" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="196" cy="250" r="11" fill="#ffffff"/>
  <circle cx="300" cy="300" r="11" fill="#ffffff"/>

  <!-- 图片卡 -->
  <g filter="url(#sh)">
    <rect x="116" y="150" width="150" height="150" rx="24" fill="#fafafa"/>
    <circle cx="167" cy="192" r="17" fill="#fbbf24"/>
    <path d="M 130 280 L 178 222 L 210 262 L 232 236 L 252 280 Z" fill="#6366f1"/>
  </g>

  <!-- 视频卡 -->
  <g filter="url(#sh)">
    <rect x="286" y="276" width="150" height="120" rx="22" fill="url(#vid)"/>
    <path d="M 345 312 L 345 360 L 386 336 Z" fill="#ffffff"/>
  </g>

  <!-- 文本卡（小） -->
  <g filter="url(#sh)">
    <rect x="150" y="330" width="116" height="78" rx="18" fill="#10b981"/>
    <rect x="168" y="352" width="80" height="9" rx="4.5" fill="#ffffff" opacity="0.92"/>
    <rect x="168" y="372" width="62" height="9" rx="4.5" fill="#ffffff" opacity="0.75"/>
  </g>

  <!-- 创意火花 -->
  <path d="M 360 150 L 372 184 L 406 196 L 372 208 L 360 242 L 348 208 L 314 196 L 348 184 Z" fill="#fde68a"/>
</svg>
