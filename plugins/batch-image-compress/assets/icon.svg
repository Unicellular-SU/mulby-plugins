<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Image frame -->
  <rect x="112" y="120" width="288" height="200" rx="16" fill="white" fill-opacity="0.15"/>
  <!-- Mountain/sun icon -->
  <path d="M112 280 L200 220 L272 270 L336 190 L400 280 L400 304 L112 304 Z" fill="white" fill-opacity="0.9"/>
  <circle cx="320" cy="200" r="24" fill="white" fill-opacity="0.7"/>
  <!-- Compression arrows (downward, indicating size reduction) -->
  <g transform="translate(256, 384)">
    <!-- Top arrow -->
    <path d="M-8,-12 L0,-24 L8,-12" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <line x1="0" y1="-24" x2="0" y2="-2" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <!-- Bottom arrow (shorter = compressed) -->
    <path d="M-8,8 L0,-4 L8,8" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-4" x2="0" y2="18" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Size indicators -->
    <line x1="-24" y1="-24" x2="-16" y2="-24" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-20" y1="-28" x2="-20" y2="-20" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-20" y1="17" x2="-20" y2="9" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="-24" y1="13" x2="-16" y2="13" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
