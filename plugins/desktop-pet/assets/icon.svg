<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
    <linearGradient id="ear-inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB8C6"/>
      <stop offset="100%" stop-color="#FF8FA3"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Body -->
  <ellipse cx="256" cy="320" rx="100" ry="80" fill="#F5A623"/>
  <!-- Belly -->
  <ellipse cx="256" cy="335" rx="60" ry="50" fill="#FFEAA7"/>
  <!-- Head -->
  <circle cx="256" cy="210" r="90" fill="#F5A623"/>
  <!-- Left ear -->
  <polygon points="180,160 200,80 240,150" fill="#F5A623"/>
  <polygon points="192,148 205,100 228,145" fill="url(#ear-inner)"/>
  <!-- Right ear -->
  <polygon points="272,150 312,80 332,160" fill="#F5A623"/>
  <polygon points="284,145 307,100 320,148" fill="url(#ear-inner)"/>
  <!-- Eyes -->
  <ellipse cx="224" cy="210" rx="14" ry="18" fill="#333"/>
  <ellipse cx="288" cy="210" rx="14" ry="18" fill="#333"/>
  <circle cx="230" cy="204" r="5" fill="#FFF"/>
  <circle cx="294" cy="204" r="5" fill="#FFF"/>
  <!-- Nose -->
  <ellipse cx="256" cy="240" rx="8" ry="6" fill="#FFB8C6"/>
  <!-- Mouth -->
  <path d="M240 252 Q256 268 272 252" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="150" y1="225" x2="210" y2="235" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="150" y1="250" x2="210" y2="245" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="302" y1="235" x2="362" y2="225" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="302" y1="245" x2="362" y2="250" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M350 310 Q400 260 380 200" stroke="#F5A623" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M378 210 Q375 195 380 200" stroke="#E8930A" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Front paws -->
  <ellipse cx="210" cy="390" rx="25" ry="15" fill="#F5A623"/>
  <ellipse cx="302" cy="390" rx="25" ry="15" fill="#F5A623"/>
  <!-- Stripes on forehead -->
  <path d="M236 170 Q256 160 276 170" stroke="#E8930A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M243 180 Q256 172 269 180" stroke="#E8930A" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
