name: Build & Release Plugins

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      plugin_list: ${{ steps.changed.outputs.plugin_list }}
      plugin_count: ${{ steps.changed.outputs.plugin_count }}
      build_mode: ${{ steps.changed.outputs.build_mode }}
      skip_build: ${{ steps.changed.outputs.skip_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed plugins
        id: changed
        run: |
          RESULT=$(node scripts/detect-changed-plugins.js --no-all-on-infra)
          echo "Detection result:"
          echo "$RESULT"

          MODE=$(echo "$RESULT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d.mode)")
          PLUGINS_JSON=$(echo "$RESULT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(JSON.stringify(d.plugins))")
          COUNT=$(echo "$RESULT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d.plugins.length)")
          PLUGIN_CSV=$(echo "$RESULT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d.plugins.join(','))")

          echo "build_mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "plugin_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "plugin_list=$PLUGIN_CSV" >> "$GITHUB_OUTPUT"
          echo "skip_build=$([ "$COUNT" = "0" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.skip_build != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'pnpm'

      - name: Generate release tag
        id: release_meta
        run: echo "tag=v$(date -u +'%Y.%m.%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Install latest mulby-cli globally
        run: npm install -g mulby-cli

      - name: Install Chromium dependencies for screenshots
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libxkbcommon0 libxdamage1 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2t64 libxrandr2 libxcomposite1 libxcursor1 \
            libxfixes3 libxi6 libxtst6 libx11-xcb1 libdrm2 fonts-noto-color-emoji

      - name: Install dependencies (pnpm workspace)
        # 合并后新插件已在 plugins/ 但根 pnpm-lock.yaml 仍未包含它（PR 不应改动锁文件），
        # --frozen-lockfile 会失败。放开冻结让 pnpm 现场补全，发布流程才能继续。
        run: pnpm install --no-frozen-lockfile

      - name: Create releases directory
        run: mkdir -p releases

      - name: Build and pack plugins
        run: |
          PLUGIN_LIST="${{ needs.detect.outputs.plugin_list }}"
          BUILD_MODE="${{ needs.detect.outputs.build_mode }}"
          RELEASE_TAG="${{ steps.release_meta.outputs.tag }}"
          BASE_RAW="https://raw.githubusercontent.com/${{ github.repository }}/main"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          echo "Build mode: $BUILD_MODE"
          echo "Plugins to build: $PLUGIN_LIST"

          # Convert CSV to array
          IFS=',' read -ra PLUGINS <<< "$PLUGIN_LIST"

          for plugin_name in "${PLUGINS[@]}"; do
            [ -z "$plugin_name" ] && continue
            plugin_dir="plugins/$plugin_name"

            if [ ! -f "$plugin_dir/package.json" ]; then
              echo "::warning::Skipping $plugin_name: no package.json"
              continue
            fi

            echo "::group::Processing plugin: $plugin_name"

            (
              cd "$plugin_dir" || exit 1

              pnpm run build || exit 1

              # Auto-generate screenshot if missing
              if [ ! -d "screenshots" ] || [ -z "$(ls -A screenshots 2>/dev/null)" ]; then
                echo "No screenshots found for $plugin_name, generating..."
                cd ../..
                node scripts/screenshot-plugin-ui.js "$plugin_name" || echo "Warning: screenshot generation failed for $plugin_name, continuing..."
                cd "$plugin_dir" || exit 1
              fi

              pnpm run pack || exit 1

              inplugin_file=$(ls -1 *.inplugin 2>/dev/null | head -n1)
              if [ -z "$inplugin_file" ]; then
                echo "Error: No .inplugin file generated for $plugin_name"
                exit 1
              fi

              echo "Found inplugin file: $inplugin_file"
              mv "$inplugin_file" ../../releases/

              if [ -f "manifest.json" ]; then
                cd ../..
                node scripts/build-plugin-index-entry.js "$plugin_name" "$inplugin_file" "$BASE_RAW" "$REPO_URL" "$RELEASE_TAG" >> plugins_temp.jsonl
                cd - > /dev/null
              fi
            ) || {
              echo "::error::Failed to process plugin: $plugin_name"
              exit 1
            }

            echo "::endgroup::"
          done

      - name: Update plugins.json (incremental merge)
        run: |
          if [ -f "plugins_temp.jsonl" ]; then
            node scripts/merge-plugins-json.js plugins_temp.jsonl
            rm plugins_temp.jsonl
          else
            echo "No new plugin entries to merge"
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          PLUGIN_LIST="${{ needs.detect.outputs.plugin_list }}"
          BUILD_MODE="${{ needs.detect.outputs.build_mode }}"
          IFS=',' read -ra PLUGINS <<< "$PLUGIN_LIST"

          NOTES="## 本次发布\n\n"
          if [ "$BUILD_MODE" = "full" ]; then
            NOTES="${NOTES}> 全量构建\n\n"
          else
            NOTES="${NOTES}> 增量发布（仅更新变更的插件）\n\n"
          fi

          NOTES="${NOTES}### 更新的插件\n\n"
          for plugin_name in "${PLUGINS[@]}"; do
            [ -z "$plugin_name" ] && continue
            VER=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('plugins/$plugin_name/manifest.json','utf8')).version)}catch{console.log('?')}")
            DISPLAY=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('plugins/$plugin_name/manifest.json','utf8')).displayName||'$plugin_name')}catch{console.log('$plugin_name')}")
            NOTES="${NOTES}- **${DISPLAY}** v${VER}\n"
          done

          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: releases/*.inplugin

      - name: Commit and push plugins index updates
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add plugins.json plugins/*/screenshots/
          if git diff --staged --quiet; then
            echo "No plugins index updates to commit."
          else
            git commit -m "chore: update plugins index [skip ci]"
            git push
          fi
