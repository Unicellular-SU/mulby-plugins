<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
    <linearGradient id="sparkleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)" />
  
  <g transform="translate(120, 150)">
    <!-- Main Image Frame -->
    <rect x="0" y="0" width="272" height="212" rx="30" fill="none" stroke="#ffffff" stroke-width="24" />
    <!-- Mountains -->
    <path d="M40 212 L120 120 L180 180 L232 140 L272 190" fill="none" stroke="#ffffff" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" />
    <!-- Sun / Moon -->
    <circle cx="80" cy="70" r="24" fill="#ffffff" />
  </g>
  
  <!-- AI Sparkles -->
  <g transform="translate(320, 90)" filter="url(#glow)">
    <path d="M40 0 C40 22 58 40 80 40 C58 40 40 58 40 80 C40 58 22 40 0 40 C22 40 40 22 40 0 Z" fill="url(#sparkleGradient)" />
  </g>
  <g transform="translate(90, 80) scale(0.6)" filter="url(#glow)">
    <path d="M40 0 C40 22 58 40 80 40 C58 40 40 58 40 80 C40 58 22 40 0 40 C22 40 40 22 40 0 Z" fill="#ffffff" />
  </g>
</svg>
