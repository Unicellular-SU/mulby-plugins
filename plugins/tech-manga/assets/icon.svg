<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded dark card -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#glow)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#6366f1" stroke-opacity="0.5" stroke-width="6"/>

  <!-- manga page: tilted panel grid -->
  <g transform="rotate(5 256 256)">
    <rect x="118" y="92" width="276" height="330" rx="18" fill="#f8fafc"/>
    <rect x="118" y="92" width="276" height="330" rx="18" fill="none" stroke="#1e1b4b" stroke-width="10"/>
    <!-- panel dividers -->
    <line x1="118" y1="206" x2="394" y2="206" stroke="#1e1b4b" stroke-width="9"/>
    <line x1="250" y1="206" x2="250" y2="422" stroke="#1e1b4b" stroke-width="9"/>

    <!-- top panel: code line motif -->
    <g stroke-linecap="round">
      <path d="M154 132 l-22 20 22 20" fill="none" stroke="#6366f1" stroke-width="12"/>
      <path d="M188 172 l16 -80" fill="none" stroke="#a855f7" stroke-width="12"/>
      <path d="M232 132 l22 20 -22 20" fill="none" stroke="#6366f1" stroke-width="12"/>
      <!-- cursor block -->
      <rect x="282" y="120" width="60" height="14" rx="7" fill="#1e1b4b"/>
      <rect x="282" y="148" width="88" height="14" rx="7" fill="#94a3b8"/>
    </g>

    <!-- bottom-left panel: robot/mascot face -->
    <g>
      <rect x="140" y="238" width="88" height="70" rx="14" fill="#1e1b4b"/>
      <circle cx="166" cy="268" r="11" fill="#818cf8"/>
      <circle cx="202" cy="268" r="11" fill="#818cf8"/>
      <rect x="162" y="288" width="44" height="8" rx="4" fill="#a855f7"/>
      <line x1="184" y1="222" x2="184" y2="238" stroke="#1e1b4b" stroke-width="8"/>
      <circle cx="184" cy="216" r="8" fill="#a855f7"/>
      <!-- hatching -->
      <g stroke="#1e1b4b" stroke-width="5" opacity="0.7">
        <line x1="136" y1="340" x2="196" y2="400"/>
        <line x1="136" y1="372" x2="176" y2="412"/>
        <line x1="168" y1="336" x2="228" y2="396"/>
      </g>
    </g>

    <!-- bottom-right panel: speech bubble with 码 -->
    <g>
      <path d="M270 246 h96 a12 12 0 0 1 12 12 v54 a12 12 0 0 1 -12 12 h-44 l-20 22 2 -22 h-34 a12 12 0 0 1 -12 -12 v-54 a12 12 0 0 1 12 -12 z" fill="#1e1b4b"/>
      <text x="296" y="303" font-family="sans-serif" font-size="44" font-weight="bold" fill="#f8fafc">码</text>
      <!-- speed lines -->
      <g stroke="#1e1b4b" stroke-width="5" opacity="0.65">
        <line x1="272" y1="366" x2="382" y2="366"/>
        <line x1="286" y1="386" x2="382" y2="386"/>
        <line x1="302" y1="406" x2="382" y2="406"/>
      </g>
    </g>
  </g>

  <!-- lightning bolt badge -->
  <path d="M120 348 l-44 66 30 4 -16 52 54 -70 -32 -6 30 -46 z" fill="url(#accent)" stroke="#0f172a" stroke-width="8" stroke-linejoin="round"/>
</svg>
